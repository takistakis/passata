[tox]
envlist = py35,py36,py37,py38,py39,py310,flake8,pyroma,check-manifest

[testenv]
passenv = DISPLAY HOME CI TRAVIS TRAVIS_*
deps =
    -r{toxinidir}/requirements.txt
    attrs==21.4.0
    certifi==2021.10.8
    charset-normalizer==2.0.10
    codecov==2.1.12
    coverage==6.2
    idna==3.3
    iniconfig==1.1.1
    packaging==21.3
    pluggy==1.0.0
    py==1.11.0
    pyparsing==3.0.6
    pytest==6.2.5
    requests==2.27.1
    toml==0.10.2
    urllib3==1.26.8
commands =
    pip check
    coverage run -m pytest --strict
    coverage report
    coverage html
    codecov

[testenv:flake8]
deps =
    flake8==4.0.1
    flake8-copyright==0.2.2
    flake8-deprecated==1.3
    flake8-docstrings==1.6.0
    flake8-import-order==0.18.1
    mccabe==0.6.1
    pycodestyle==2.8.0
    pydocstyle==6.1.1
    pyflakes==2.4.0
    snowballstemmer==2.2.0
commands =
    pip check
    {envpython} -m flake8

[testenv:pyroma]
deps =
    certifi==2021.10.8
    charset-normalizer==2.0.10
    docutils==0.18.1
    idna==3.3
    pygments==2.11.2
    pyroma==3.2
    requests==2.27.1
    urllib3==1.26.8
commands =
    pip check
    pyroma .

[testenv:check-manifest]
deps =
    build==0.7.0
    check-manifest==0.47
    packaging==21.3
    pep517==0.12.0
    pyparsing==3.0.6
    toml==0.10.2
    tomli==2.0.0
commands =
    pip check
    check-manifest

[flake8]
ignore = D100,D101,D102,D103,D104,D105,D106,D107,W503
copyright-check = True
application-import-names = passata,tests
import-order-style = smarkets
